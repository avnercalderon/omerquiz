<!DOCTYPE html>
<html lang="he" dir="rtl" style="height:100%">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>חידון-על 🎯</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Secular+One&family=Heebo:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#12152B; --bg2:#1A1E3D; --card:#22264D; --line:#33386B;
    --text:#F2F3FF; --muted:#9CA3D4; --gold:#FFC53D;
    --c-signs:#E5484D; --c-flags:#3E63DD; --c-caps:#30A46C;
    --c-places:#F76B15; --c-cars:#8E4EC6; --c-syms:#12A594; --c-acro:#D6409F; --c-eng:#00A2C7;
    --c-foot:#7CB342; --c-bball:#FF7043; --c-ussp:#5C6BC0; --c-idiom:#E5A50A; --c-emoji:#FF5D8F; --c-math:#0CA678; --c-heb:#845EF7;
    --ok:#46C97B; --bad:#F26D78;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html{height:100%}
  body{
    margin:0; min-height:100%; background:var(--bg); color:var(--text);
    font-family:'Heebo',sans-serif; -webkit-overflow-scrolling:touch;
    background-image:radial-gradient(circle at 15% 10%, #232866 0%, transparent 40%),
                     radial-gradient(circle at 85% 90%, #1c3559 0%, transparent 45%);
    background-attachment:fixed; transform:translateZ(0);
  }
  .wrap{max-width:820px; margin:0 auto; padding:20px 16px 60px}
  h1,h2,.display{font-family:'Secular One',sans-serif; font-weight:400; letter-spacing:.5px}

  /* ---------- HOME ---------- */
  .hero{text-align:center; padding:18px 0 8px}
  .hero h1{font-size:44px; margin:0}
  .hero .sub{color:var(--muted); margin-top:6px; font-size:17px}
  .grid{display:grid; grid-template-columns:repeat(2,1fr); gap:14px; margin-top:22px}
  .qcard{
    border:none; border-radius:22px; padding:20px 14px 16px; cursor:pointer;
    background:var(--card); color:var(--text); text-align:center;
    border-bottom:6px solid var(--qc,#555); box-shadow:0 8px 24px rgba(0,0,0,.35);
    transition:transform .12s ease, box-shadow .12s ease; min-height:120px;
    font-family:'Heebo',sans-serif;
  }
  .qcard:active{transform:scale(.96)}
  @media(hover:hover){ .qcard:hover{transform:translateY(-4px); box-shadow:0 14px 30px rgba(0,0,0,.45)} }
  .qcard .ico{font-size:40px; line-height:1}
  .qcard .nm{font-family:'Secular One'; font-size:20px; margin-top:8px}
  .qcard .best{font-size:13px; color:var(--muted); margin-top:4px}
  .qcard .best b{color:var(--gold)}

  /* ---------- MODE MODAL ---------- */
  .overlay{position:fixed; inset:0; background:rgba(8,10,25,.75); backdrop-filter:blur(4px);
    display:flex; align-items:center; justify-content:center; z-index:50; padding:20px}
  .modal{background:var(--bg2); border:1px solid var(--line); border-radius:24px; padding:26px 22px;
    width:100%; max-width:420px; text-align:center; box-shadow:0 20px 60px rgba(0,0,0,.5)}
  .modal .ico{font-size:52px}
  .modal h2{font-size:28px; margin:8px 0 4px}
  .modal p{color:var(--muted); margin:0 0 18px}
  .modebtn{display:flex; align-items:center; gap:14px; width:100%; border:2px solid var(--line);
    background:var(--card); color:var(--text); border-radius:16px; padding:14px 16px; margin-top:10px;
    cursor:pointer; font-family:'Heebo'; font-size:17px; text-align:right; min-height:44px;
    transition:border-color .15s, transform .1s}
  .modebtn:active{transform:scale(.97)}
  .modebtn .m-ico{font-size:28px}
  .modebtn small{display:block; color:var(--muted); font-size:13px; margin-top:2px}
  .modebtn:hover{border-color:var(--gold)}
  .closex{margin-top:16px; background:none; border:none; color:var(--muted); font-size:15px;
    cursor:pointer; font-family:'Heebo'; min-height:44px}

  /* ---------- LOADING ---------- */
  .loadbox{text-align:center; padding:80px 20px; color:var(--muted); font-size:18px}
  .spinner{width:44px; height:44px; margin:0 auto 18px; border-radius:50%;
    border:5px solid var(--card); border-top-color:var(--gold); animation:spin .9s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ---------- QUIZ ---------- */
  .topbar{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:14px}
  .pill{background:var(--card); border:1px solid var(--line); border-radius:999px;
    padding:8px 14px; font-size:15px; display:flex; align-items:center; gap:6px; min-height:44px}
  .pill b{color:var(--gold)}
  .exitbtn{background:var(--card); border:1px solid var(--line); color:var(--muted); border-radius:999px;
    width:44px; height:44px; font-size:18px; cursor:pointer}
  .streak{color:#FF8A3D; font-weight:700}

  .progress{height:8px; background:var(--card); border-radius:99px; overflow:hidden; margin-bottom:16px}
  .progress i{display:block; height:100%; width:0%; background:var(--qc,var(--gold)); border-radius:99px;
    transition:width .3s ease}

  .stage{
    background:var(--bg2); border:1px solid var(--line); border-radius:26px;
    padding:22px 16px; text-align:center; position:relative; overflow:hidden;
    box-shadow:inset 0 0 60px rgba(0,0,0,.25);
  }
  .stage::before{content:''; position:absolute; inset:-40%;
    background:radial-gradient(circle, color-mix(in srgb, var(--qc) 14%, transparent) 0%, transparent 60%);
    pointer-events:none}
  .visual{min-height:160px; display:flex; align-items:center; justify-content:center; margin-bottom:8px}
  .visual img.sign{width:160px; height:160px; object-fit:contain;
    filter:drop-shadow(0 8px 16px rgba(0,0,0,.4))}
  .visual img.flag{width:220px; max-width:70vw; border-radius:10px; box-shadow:0 10px 24px rgba(0,0,0,.5)}
  .visual img.logo{width:150px; height:150px; object-fit:contain; background:#fff; border-radius:20px;
    padding:14px; box-shadow:0 10px 24px rgba(0,0,0,.5)}
  .visual img.photo{width:280px; max-width:78vw; height:190px; object-fit:cover; border-radius:14px;
    box-shadow:0 12px 28px rgba(0,0,0,.55)}
  .visual img.face{width:185px; height:230px; object-fit:cover; object-position:top; border-radius:16px;
    box-shadow:0 12px 28px rgba(0,0,0,.55)}
  .visual .glyph{font-size:92px; font-weight:900; line-height:1; text-shadow:0 8px 24px rgba(0,0,0,.5)}
  .visual .glyph.acro{font-size:56px; font-family:'Secular One'}
  .visual .glyph.eng{font-size:44px; font-family:'Heebo'; font-weight:900; direction:ltr; letter-spacing:1.5px}
  .visual .glyph.idiom{font-size:30px; font-family:'Secular One'; line-height:1.4; padding:6px 10px}
  .visual .glyph.emojiq{font-size:54px; letter-spacing:6px; line-height:1.2; text-shadow:none}
  .visual .glyph.math{font-size:42px; font-family:'Heebo'; font-weight:900; direction:ltr; letter-spacing:2px}
  .visual .bigmoji{font-size:88px; line-height:1}
  .qtext{font-family:'Secular One'; font-size:24px; margin:6px 4px 2px; position:relative}

  .timer{position:absolute; top:12px; left:12px; width:52px; height:52px; z-index:5}
  .timer svg{width:52px; height:52px; transform:rotate(-90deg)}
  .timer .tnum{position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-weight:900; font-size:17px}
  .timer.hurry .tnum{color:var(--bad); animation:pulse .5s infinite alternate}
  @keyframes pulse{to{transform:scale(1.25)}}

  .answers{display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-top:18px}
  .ans{
    border:2px solid var(--line); background:var(--card); color:var(--text);
    border-radius:16px; padding:16px 12px; font-family:'Heebo'; font-size:17px; font-weight:500;
    cursor:pointer; min-height:58px; transition:transform .1s, border-color .15s, background .15s;
  }
  .ans:active{transform:scale(.96)}
  @media(hover:hover){ .ans:hover{border-color:var(--qc)} }
  .ans.correct{background:#1B4332; border-color:var(--ok); color:#C7F5D9}
  .ans.wrong{background:#4A1F27; border-color:var(--bad); color:#FFD3D8}
  .ans.dim{opacity:.45}
  .ans:disabled{cursor:default}
  .feedback{min-height:30px; margin-top:14px; font-size:19px; font-weight:700}
  .feedback.ok{color:var(--ok)} .feedback.bad{color:var(--bad)}

  /* ---------- RESULTS ---------- */
  .results{text-align:center; padding:30px 10px}
  .results .bigmoji{font-size:80px}
  .results h2{font-size:34px; margin:10px 0 2px}
  .results .scoreline{font-size:22px; color:var(--muted)}
  .results .scoreline b{color:var(--gold); font-size:34px; font-family:'Secular One'}
  .newbest{display:inline-block; margin-top:10px; background:var(--gold); color:#3a2b00;
    border-radius:999px; padding:6px 16px; font-weight:900; animation:pop .4s ease}
  @keyframes pop{from{transform:scale(0)} to{transform:scale(1)}}
  .rbtns{display:flex; gap:12px; justify-content:center; margin-top:26px; flex-wrap:wrap}
  .btn{border:none; border-radius:16px; padding:14px 26px; font-family:'Heebo'; font-size:18px;
    font-weight:700; cursor:pointer; min-height:48px}
  .btn.primary{background:var(--gold); color:#3a2b00}
  .btn.ghost{background:var(--card); color:var(--text); border:2px solid var(--line)}
  .btn:active{transform:scale(.96)}

  .credit{text-align:center; color:var(--muted); font-size:12px; margin-top:26px; opacity:.7}
  .hidden{display:none !important}

  .confetti{position:fixed; top:-20px; width:10px; height:14px; z-index:99; pointer-events:none;
    animation:fall linear forwards}
  @keyframes fall{to{transform:translateY(110vh) rotate(720deg); opacity:.6}}

  @media(prefers-reduced-motion:reduce){ *{animation:none !important; transition:none !important} }

  /* ---------- MOBILE ---------- */
  @media(max-width:600px){
    .wrap{padding:14px 12px 40px}
    .hero h1{font-size:34px}
    .grid{gap:10px}
    .qcard{padding:16px 10px 12px; border-radius:18px}
    .qcard .ico{font-size:32px} .qcard .nm{font-size:17px}
    .visual img.sign{width:130px; height:130px}
    .visual img.flag{width:185px}
    .visual img.logo{width:120px; height:120px}
    .visual img.photo{width:100%; height:170px}
    .visual img.face{width:160px; height:200px}
    .visual .glyph{font-size:74px} .visual .glyph.acro{font-size:44px}
    .visual .glyph.eng{font-size:34px}
    .visual .glyph.idiom{font-size:24px}
    .visual .glyph.emojiq{font-size:42px; letter-spacing:4px}
    .visual .glyph.math{font-size:30px}
    .visual .bigmoji{font-size:70px}
    .qtext{font-size:20px}
    .answers{grid-template-columns:1fr; gap:10px}
    .ans{width:100%; padding:14px 12px; font-size:16px}
    .pill{font-size:13px; padding:6px 11px}
  }
</style>
</head>
<body>
<div class="wrap">

  <!-- HOME -->
  <div id="home">
    <div class="hero">
      <h1>🎯 חידון־על</h1>
      <div class="sub">בחר קטגוריה והתחל לשחק</div>
    </div>
    <div class="grid" id="quizGrid"></div>
    <div class="credit">תמונות: לוח התמרורים – ויקישיתוף · דגלים – flagcdn · מקומות – ויקיפדיה</div>
  </div>

  <!-- LOADING -->
  <div id="loading" class="hidden">
    <div class="loadbox"><div class="spinner"></div>טוען שאלות...</div>
  </div>

  <!-- QUIZ -->
  <div id="quiz" class="hidden">
    <div class="topbar">
      <button class="exitbtn" onclick="exitQuiz()" aria-label="יציאה">✕</button>
      <div class="pill">שאלה <b id="qNum">1</b>/<span id="qTot">10</span></div>
      <div class="pill">🏆 <b id="score">0</b></div>
      <div class="pill streak" id="streakPill">🔥 0</div>
    </div>
    <div class="progress"><i id="progBar"></i></div>
    <div class="stage" id="stage">
      <div class="timer hidden" id="timerBox">
        <svg viewBox="0 0 52 52">
          <circle cx="26" cy="26" r="22" fill="none" stroke="#33386B" stroke-width="5"/>
          <circle id="timerRing" cx="26" cy="26" r="22" fill="none" stroke="#FFC53D" stroke-width="5"
                  stroke-linecap="round" stroke-dasharray="138.2" stroke-dashoffset="0"/>
        </svg>
        <div class="tnum" id="timerNum">15</div>
      </div>
      <div class="visual" id="visual"></div>
      <div class="qtext" id="qText"></div>
      <div class="answers" id="answers"></div>
      <div class="feedback" id="feedback"></div>
    </div>
  </div>

  <!-- RESULTS -->
  <div id="resultsScr" class="hidden">
    <div class="results">
      <div class="bigmoji" id="resEmoji">🎉</div>
      <h2 id="resTitle"></h2>
      <div class="scoreline"><b id="resScore">0</b> נקודות · <span id="resRight"></span></div>
      <div id="resBest"></div>
      <div class="rbtns">
        <button class="btn primary" onclick="startQuiz(state.quizKey, state.mode)">🔄 עוד סיבוב</button>
        <button class="btn ghost" onclick="goHome()">🏠 לתפריט</button>
      </div>
    </div>
  </div>
</div>

<!-- MODE MODAL -->
<div class="overlay hidden" id="modeOverlay">
  <div class="modal">
    <div class="ico" id="modalIco">🎯</div>
    <h2 id="modalTitle"></h2>
    <p>איך בא לך לשחק?</p>
    <button class="modebtn" onclick="pickMode('relax')">
      <span class="m-ico">🧘</span>
      <span>מצב רגוע<small>בלי לחץ, בקצב שלך</small></span>
    </button>
    <button class="modebtn" onclick="pickMode('timer')">
      <span class="m-ico">⏱️</span>
      <span>נגד השעון<small>15 שניות לשאלה + בונוס מהירות</small></span>
    </button>
    <button class="closex" onclick="closeModal()">ביטול</button>
  </div>
</div>

<script>

/* ============ חידוני חשבון — תרגילים חדשים בכל סיבוב ============ */
const ri = (a,b)=>a+Math.floor(Math.random()*(b-a+1));
const pick = arr=>arr[Math.floor(Math.random()*arr.length)];
function mkd(ans, allowNeg=false){ // שלושה מסיחים מספריים סבירים
  const set = new Set([ans]); const out = [];
  const base = [ans+1,ans-1,ans+2,ans-2,ans+10,ans-10,ans+5,ans-5,ans+3,ans-3,ans*2];
  for(const c of base.sort(()=>Math.random()-0.5)){
    if(out.length>=3) break;
    if(!set.has(c) && Number.isInteger(c) && (allowNeg || c>=0)){ set.add(c); out.push(c); }
  }
  let g=0;
  while(out.length<3 && g++<50){ const c=ans+ri(4,40)*(allowNeg&&Math.random()<0.5?-1:1); if(!set.has(c)){set.add(c);out.push(c);} }
  return out.map(String);
}
const M = (glyph,ans,d,q='מה התוצאה?')=>({glyph, gcls:'math', q, a:String(ans), d});
function withTrap(ans, trap, allowNeg=false){ // מסיח-מלכודת + השלמה, הכל ייחודי
  const A = String(ans), set = new Set([A]), out = [];
  const push = v=>{ const s=String(v); if(!set.has(s) && out.length<3){ set.add(s); out.push(s); } };
  push(trap);
  for(const c of mkd(ans, allowNeg)) push(c);
  let g=0; while(out.length<3 && g++<50) push(ans+ri(4,40));
  return out;
}

function genMath2(){
  switch(ri(1,4)){
    case 1: { const a=ri(10,79), b=ri(5,99-a); return M(`${a} + ${b} = ?`, a+b, mkd(a+b)); }
    case 2: { const a=ri(20,99), b=ri(3,a-2); return M(`${a} − ${b} = ?`, a-b, mkd(a-b)); }
    case 3: { const a=ri(2,5), b=ri(2,10); return M(`${a} × ${b} = ?`, a*b, mkd(a*b)); }
    default:{ const a=ri(2,9), s=ri(a+2,20); return M(`${a} + ▢ = ${s}`, s-a, mkd(s-a), 'איזה מספר חסר?'); }
  }
}

function genMath4(){
  switch(ri(1,7)){
    case 1: { const a=ri(3,10), b=ri(3,10); return M(`${a} × ${b} = ?`, a*b, mkd(a*b)); }
    case 2: { const a=ri(120,899), b=ri(45,900); const s=a+b; return M(`${a} + ${b} = ?`, s, mkd(s)); }
    case 3: { const a=ri(300,999), b=ri(45,a-50); return M(`${a} − ${b} = ?`, a-b, mkd(a-b)); }
    case 4: { const b=ri(2,10), r=ri(2,12); return M(`${b*r} ÷ ${b} = ?`, r, mkd(r)); }
    case 5: { const half=Math.random()<0.5; const n=half?ri(6,60)*2:ri(4,30)*4;
      return M(half?`חצי מ־${n} = ?`:`רבע מ־${n} = ?`, half?n/2:n/4, mkd(half?n/2:n/4)); }
    case 6: { const a=ri(3,9), p=ri(3,9); return M(`${a} × ▢ = ${a*p}`, p, mkd(p), 'איזה מספר חסר?'); }
    default:{ const n=ri(3,29)*10+ri(1,9); const ans=Math.round(n/10)*10;
      return M(`עגלו את ${n} לעשרת הקרובה`, ans, withTrap(ans, ans + (n%10>=5?-10:10)), 'מהו המספר המעוגל?'); }
  }
}

const FRAC5 = [
  ['1/2 + 1/4 = ?','3/4',['2/6','1/6','1/4']],
  ['1/3 + 1/3 = ?','2/3',['1/3','2/6','1/6']],
  ['1 − 1/4 = ?','3/4',['1/4','2/4','1/2']],
  ['1/2 + 1/2 = ?','1',['2/4','1/4','2']],
  ['3/4 − 1/4 = ?','1/2',['2/8','3/4','1/4']],
  ['1/5 + 2/5 = ?','3/5',['3/10','2/5','1/2']],
  ['2 × 1/2 = ?','1',['2/2 וחצי','1/4','4']],
  ['1/2 מתוך 10 = ?','5',['2','20','1/2']],
];
function genMath5(){
  switch(ri(1,7)){
    case 1: { const a=ri(12,99), b=ri(3,12); return M(`${a} × ${b} = ?`, a*b, mkd(a*b)); }
    case 2: { const b=ri(3,12), r=ri(4,25); return M(`${b*r} ÷ ${b} = ?`, r, mkd(r)); }
    case 3: { const x=ri(11,99), y=ri(11,99); const ans=((x+y)/10).toFixed(1);
      const d=[((x+y+1)/10).toFixed(1),((x+y-1)/10).toFixed(1),((x+y+10)/10).toFixed(1)];
      return M(`${(x/10).toFixed(1)} + ${(y/10).toFixed(1)} = ?`, ans, d); }
    case 4: { const p=pick([10,20,25,50]), n=ri(1,10)*20; return M(`${p}% מתוך ${n} = ?`, n*p/100, mkd(n*p/100)); }
    case 5: { const f=pick(FRAC5); return M(f[0], f[1], f[2].slice()); }
    case 6: { const a=ri(2,9), b=ri(2,9), c=ri(2,9); const ans=a+b*c;
      return M(`${a} + ${b} × ${c} = ?`, ans, withTrap(ans, (a+b)*c)); }
    default:{ const m=ri(4,20), k=ri(1,4); const t=[m-k,m,m+k];
      return M(`הממוצע של ${t[0]} , ${t[1]} , ${t[2]} = ?`, m, mkd(m)); }
  }
}

const PYTH = [[3,4,5],[6,8,10],[5,12,13],[9,12,15],[8,15,17],[7,24,25],[12,16,20]];
function genMath8(){
  switch(ri(1,11)){
    case 1: { const x=ri(2,12), c=ri(2,6), a=c+ri(1,5), b=ri(1,15); const d=a*x+b-c*x;
      return M(`${a}x + ${b} = ${c}x + ${d}`, x, mkd(x), 'מהו x?'); }
    case 2: { const x=ri(2,12), a=ri(2,7), b=ri(1,9); return M(`${a}(x + ${b}) = ${a*(x+b)}`, x, mkd(x), 'מהו x?'); }
    case 3: { const n=ri(3,12); const ans=n*n; return M(`(−${n})² = ?`, ans, withTrap(ans, -ans, true)); }
    case 4: { const k=ri(4,10); const S='⁰¹²³⁴⁵⁶⁷⁸⁹'; const ans=2**k;
      return M(`2${S[k]} = ?`, ans, withTrap(ans, 2*k)); }
    case 5: { const m=ri(2,7), n=ri(2,7); const S='⁰¹²³⁴⁵⁶⁷⁸⁹';
      return M(`a${S[m]} × a${S[n]} = a בחזקת ?`, m+n, withTrap(m+n, m*n)); }
    case 6: { const r=ri(2,6); return M(`∛${r*r*r} = ?`, r, mkd(r)); }
    case 7: { const r=ri(11,20); return M(`√${r*r} = ?`, r, mkd(r)); }
    case 8: { const p=pick([10,20,25,50]), orig=ri(2,10)*40; const sale=orig*(100-p)/100;
      return M(`אחרי הנחה של ${p}% המחיר הוא ${sale} ₪`, orig, withTrap(orig, Math.round(sale*(100+p)/100)), 'מה היה המחיר לפני ההנחה?'); }
    case 9: { const mm=pick([3,4,5,6]), k=ri(1,mm-1), n=ri(2,12)*mm; const ans=n*k/mm;
      return M(`${k}/${mm} מתוך ${n} = ?`, ans, mkd(ans)); }
    case 10: { const t=pick(PYTH);
      if(Math.random()<0.5) return {glyph:`ניצבים: ${t[0]} ו־${t[1]}`, gcls:'acro', q:'מה אורך היתר במשולש ישר־זווית?', a:String(t[2]), d:mkd(t[2])};
      return {glyph:`יתר: ${t[2]} , ניצב: ${t[1]}`, gcls:'acro', q:'מה אורך הניצב השני?', a:String(t[0]), d:mkd(t[0])}; }
    default:{
      if(Math.random()<0.5){
        const mm=ri(2,8)*(Math.random()<0.4?-1:1), x=ri(2,9), b=ri(-9,9); const y=mm*x+b;
        return M(`y = ${mm}x ${b>=0?'+ '+b:'− '+(-b)} ,  x = ${x}`, y, mkd(y,true), 'מהו y?'); }
      const v=pick([60,90,120,180]), t=pick([20,30,40,50]); const dkm=v*t/60;
      if(!Number.isInteger(dkm)) return genMath8();
      return M(`מהירות: ${v} קמ״ש , זמן: ${t} דקות`, dkm, mkd(dkm), 'כמה קילומטרים עוברים?'); }
  }
}

const mem = {};

  get(k){ try{ return localStorage.getItem(k) ?? mem[k] ?? null }catch(e){ return mem[k] ?? null } },
  set(k,v){ mem[k]=String(v); try{ localStorage.setItem(k,v) }catch(e){} }
};
const bestKey = (k,m)=>`quizbest_${k}_${m}`;

/* ============ GAME STATE ============ */
const N_QUESTIONS = 10, TIME_PER_Q = 15;
let state = {};
let timerInt = null;
let pendingQuiz = null;
const placeImgCache = {};

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){ const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
const show = id => document.getElementById(id).classList.remove('hidden');
const hide = id => document.getElementById(id).classList.add('hidden');

/* ============ HOME ============ */
function renderHome(){
  const g = document.getElementById('quizGrid');
  g.innerHTML = '';
  for(const key in QUIZZES){
    const q = QUIZZES[key];
    const bR = store.get(bestKey(key,'relax')), bT = store.get(bestKey(key,'timer'));
    const best = Math.max(bR?+bR:0, bT?+bT:0);
    const btn = document.createElement('button');
    btn.className = 'qcard';
    btn.style.setProperty('--qc', q.color);
    btn.innerHTML = `<div class="ico">${q.ico}</div><div class="nm">${q.name}</div>
      <div class="best">${best>0 ? `שיא: <b>${best}</b>` : 'עוד לא שיחקת'}</div>`;
    btn.onclick = ()=>openModal(key);
    g.appendChild(btn);
  }
}

function openModal(key){

  document.getElementById('modalIco').textContent = QUIZZES[key].ico;

  show('modeOverlay');
}

/* ============ PRELOADING ============ */
function preloadImage(url, timeoutMs=6000){
  return new Promise(res=>{
    const img = new Image();
    const t = setTimeout(()=>res(false), timeoutMs);
    img.onload = ()=>{ clearTimeout(t); res(true); };
    img.onerror = ()=>{ clearTimeout(t); res(false); };
    img.src = url;
  });
}

async function fetchPlaceImage(title){
  if(title in placeImgCache) return placeImgCache[title];
  try{
    const r = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title)}`);
    if(!r.ok) throw 0;
    const d = await r.json();
    const url = d.thumbnail?.source || null;
    placeImgCache[title] = url;
    return url;
  }catch(e){ placeImgCache[title] = null; return null; }
}

async function prepareItems(key){
  const quiz = QUIZZES[key];
  if(quiz.gen){ // חידון מחולל — תרגילים חדשים בכל סיבוב
    const items = [], seen = new Set(); let g = 0;
    while(items.length < N_QUESTIONS && g++ < 300){
      const it = quiz.gen();
      if(!seen.has(it.glyph)){ seen.add(it.glyph); items.push(it); }
    }
    return items;
  }
  const sample = shuffle(quiz.items).slice(0, N_QUESTIONS + 5); // כמה רזרביים
  if(quiz.items[0]?.wiki){
    await Promise.all(sample.map(async it=>{
      const url = await fetchPlaceImage(it.wiki);
      it.photo = (url && await preloadImage(url)) ? url : null; // וידוא שהתמונה באמת נטענת
    }));
    const withPhoto = sample.filter(it=>it.photo);
    const rest = sample.filter(it=>!it.photo);
    // במקומות מפורסמים יש אימוג'י כגיבוי; בקבוצות ספורט חובה לוגו
    const usable = (key === 'places') ? [...withPhoto, ...rest] : withPhoto;
    return (usable.length ? usable : withPhoto.concat(rest)).slice(0, N_QUESTIONS);
  }
  if(quiz.items[0]?.preload){
    const results = await Promise.all(sample.map(it=>preloadImage(it.img)));
    const good = sample.filter((it,i)=>results[i]);
    return (good.length >= N_QUESTIONS ? good : sample).slice(0, N_QUESTIONS);
  }
  return sample.slice(0, N_QUESTIONS);
}

/* ============ QUIZ FLOW ============ */
async function startQuiz(key, mode){
  const quiz = QUIZZES[key];
  hide('home'); hide('resultsScr'); hide('quiz'); show('loading');
  window.scrollTo(0,0);
  let items;
  try{ items = await prepareItems(key); }
  catch(e){ items = shuffle(quiz.items).slice(0, N_QUESTIONS); }
  hide('loading');
  state = {quizKey:key, mode, items, idx:0, score:0, right:0, streak:0, bestStreak:0};
  show('quiz');
  document.getElementById('stage').style.setProperty('--qc', quiz.color);
  document.getElementById('progBar').style.setProperty('--qc', quiz.color);
  document.getElementById('qTot').textContent = state.items.length;
  document.getElementById('timerBox').classList.toggle('hidden', mode!=='timer');
  showQuestion();
}

function distractors(quiz, correct, item){
  if(item && item.d && item.d.length >= 3) return shuffle(item.d).slice(0,3);
  if(item && item.grp){
    const gpool = [...new Set(quiz.items.filter(i=>i.grp===item.grp).map(i=>i.a))].filter(a=>a!==correct);
    if(gpool.length >= 3) return shuffle(gpool).slice(0,3);
  }
  const pool = [...new Set(quiz.items.map(i=>i.a))].filter(a=>a!==correct);
  return shuffle(pool).slice(0,3);
}

function showQuestion(){
  clearInterval(timerInt);
  const quiz = QUIZZES[state.quizKey];
  const item = state.items[state.idx];

  document.getElementById('qNum').textContent = state.idx+1;
  document.getElementById('score').textContent = state.score;
  document.getElementById('streakPill').textContent = '🔥 ' + state.streak;
  document.getElementById('progBar').style.width = (state.idx/state.items.length*100)+'%';
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';

  const vis = document.getElementById('visual');
  if(item.wiki){
    const cls = item.cls || 'photo';
    if(item.photo){
      vis.innerHTML = `<img class="${cls}" src="${item.photo}" alt="">`;
      vis.querySelector('img').onerror = ()=>{ vis.innerHTML = item.emoji ? `<div class="bigmoji">${item.emoji}</div>` : ''; };
    } else {
      vis.innerHTML = item.emoji ? `<div class="bigmoji">${item.emoji}</div>` : '';
    }
  }
  else if(item.img)   vis.innerHTML = `<img class="${item.cls||''}" src="${item.img}" alt="">`;
  else if(item.glyph) vis.innerHTML = `<div class="glyph ${item.gcls||''}" style="color:${quiz.color}">${item.glyph}</div>`;
  else                vis.innerHTML = '';

  document.getElementById('qText').textContent = item.q || quiz.q || '';

  const opts = shuffle([item.a, ...distractors(quiz, item.a, item)]);
  const box = document.getElementById('answers');
  box.innerHTML = '';
  opts.forEach(opt=>{
    const b = document.createElement('button');
    b.className = 'ans';
    b.textContent = opt;
    b.onclick = ()=>answer(b, opt, item.a);
    box.appendChild(b);
  });

  if(state.mode==='timer') startTimer();
}

function startTimer(){
  let t = TIME_PER_Q;
  const num = document.getElementById('timerNum');
  const ring = document.getElementById('timerRing');
  const box = document.getElementById('timerBox');
  const CIRC = 138.2;
  box.classList.remove('hurry');
  num.textContent = t;
  ring.style.strokeDashoffset = 0;
  ring.style.stroke = '#FFC53D';
  state.tLeft = t;
  timerInt = setInterval(()=>{
    t -= 0.1;
    state.tLeft = t;
    num.textContent = Math.ceil(t);
    ring.style.strokeDashoffset = CIRC * (1 - t/TIME_PER_Q);
    if(t <= 5){ box.classList.add('hurry'); ring.style.stroke = '#F26D78'; }
    if(t <= 0){ clearInterval(timerInt); timeOut(); }
  }, 100);
}

function timeOut(){
  const item = state.items[state.idx];
  document.querySelectorAll('.ans').forEach(b=>{
    b.disabled = true;
    if(b.textContent===item.a) b.classList.add('correct'); else b.classList.add('dim');
  });
  state.streak = 0;
  const fb = document.getElementById('feedback');
  fb.textContent = '⏰ נגמר הזמן!';
  fb.classList.add('bad');
  setTimeout(nextQuestion, 1600);
}

function answer(btn, chosen, correct){
  clearInterval(timerInt);
  document.querySelectorAll('.ans').forEach(b=>{
    b.disabled = true;
    if(b.textContent===correct) b.classList.add('correct');
    else if(b===btn) b.classList.add('wrong');
    else b.classList.add('dim');
  });
  const fb = document.getElementById('feedback');
  if(chosen===correct){
    let pts = 10;
    if(state.mode==='timer') pts += Math.max(0, Math.round(state.tLeft/3)); // עד +5 בונוס מהירות
    state.score += pts;
    state.right++;
    state.streak++;
    state.bestStreak = Math.max(state.bestStreak, state.streak);
    fb.textContent = state.streak>=3 ? `🔥 מדהים! +${pts} (רצף ${state.streak})` : `✅ נכון! +${pts}`;
    fb.classList.add('ok');
  } else {
    state.streak = 0;
    fb.textContent = `❌ התשובה הנכונה: ${correct}`;
    fb.classList.add('bad');
  }
  document.getElementById('score').textContent = state.score;
  document.getElementById('streakPill').textContent = '🔥 ' + state.streak;
  setTimeout(nextQuestion, chosen===correct ? 1000 : 1900);
}

function nextQuestion(){
  state.idx++;
  if(state.idx >= state.items.length) showResults();
  else showQuestion();
}

/* ============ RESULTS ============ */
function showResults(){
  clearInterval(timerInt);
  hide('quiz'); show('resultsScr');
  const n = state.items.length, r = state.right;
  const pct = r/n;
  let emoji, title;
  if(pct===1){ emoji='🏆'; title='מושלם!!'; }
  else if(pct>=0.8){ emoji='🎉'; title='כל הכבוד!'; }
  else if(pct>=0.6){ emoji='😎'; title='יפה מאוד!'; }
  else if(pct>=0.4){ emoji='🙂'; title='לא רע!'; }
  else { emoji='💪'; title='ננסה שוב?'; }
  document.getElementById('resEmoji').textContent = emoji;
  document.getElementById('resTitle').textContent = title;
  document.getElementById('resScore').textContent = state.score;
  document.getElementById('resRight').textContent = `${r} מתוך ${n} נכונות · רצף שיא ${state.bestStreak}`;

  const bk = bestKey(state.quizKey, state.mode);
  const prev = +(store.get(bk) || 0);
  const bestEl = document.getElementById('resBest');
  if(state.score > prev){
    store.set(bk, state.score);
    bestEl.innerHTML = '<div class="newbest">⭐ שיא חדש! ⭐</div>';
  } else {
    bestEl.innerHTML = `<div style="color:var(--muted); margin-top:10px">השיא שלך: ${prev}</div>`;
  }
  if(pct>=0.8) confetti();
  window.scrollTo(0,0);
}

function confetti(){
  const colors = ['#FFC53D','#E5484D','#3E63DD','#30A46C','#F76B15','#8E4EC6','#12A594','#D6409F'];
  for(let i=0;i<70;i++){
    const p = document.createElement('div');
    p.className = 'confetti';
    p.style.left = Math.random()*100+'vw';
    p.style.background = colors[Math.floor(Math.random()*colors.length)];
    p.style.animationDuration = (2+Math.random()*2.5)+'s';
    p.style.animationDelay = (Math.random()*0.8)+'s';
    p.style.borderRadius = Math.random()>0.5 ? '50%' : '2px';
    document.body.appendChild(p);
    setTimeout(()=>p.remove(), 5500);
  }
}

function exitQuiz(){ clearInterval(timerInt); goHome(); }
function goHome(){
  hide('quiz'); hide('resultsScr'); hide('loading');
  show('home');
  renderHome();
  window.scrollTo(0,0);
}

renderHome();
</script>
